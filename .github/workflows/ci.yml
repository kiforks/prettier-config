name: Build

on:
  pull_request:
    branches:
      - main
      - '!dependabot/**'

env:
  # Opt in to running official GitHub Actions on Node 24 ahead of the
  # June 2026 default switchover. Suppresses the deprecation warning on
  # actions/checkout@v4 / actions/setup-node@v4 about Node 20 being phased out.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Automatic label creation for PR
        uses: actions/labeler@v5
        with:
          sync-labels: true

  changeset-status:
    name: 'Check Changeset'
    runs-on: ubuntu-latest
    # Skip on the bot-opened Version PR (`changeset-release/main`). That PR
    # consumes changesets instead of adding them, so this check would fail
    # by design. Exact branch match — `changesets/action` hard-codes the name
    # as `changeset-release/<base>`, so a regular contributor can't bypass
    # the check by naming their branch similarly.
    if: ${{ github.head_ref != 'changeset-release/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
      - run: npm ci
      - name: Verify changeset exists for PR
        run: npx changeset status --since=origin/main

  validation:
    name: 'Code Quality'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['22.x', '24.x']
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - run: npm ci
      - name: Check formatting
        run: npm run format
      - name: Run tests
        run: npm test
