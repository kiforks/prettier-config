name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  # Required for npm Trusted Publishing (OIDC). The id-token is what proves to
  # npm that the publish request really comes from this GitHub Actions workflow,
  # so no long-lived npm token (and no 2FA bypass) is needed.
  # See: https://docs.npmjs.com/trusted-publishers
  id-token: write

env:
  # Husky hooks are for local dev only. CI doesn't need them, and the bot's
  # release commit wouldn't pass our strict commit-msg hook regex without this.
  HUSKY: '0'
  # Opt in to running official GitHub Actions on Node 24 ahead of the
  # June 2026 default switchover. Suppresses the deprecation warning on
  # actions/checkout@v4 / actions/setup-node@v4 about Node 20 being phased out.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    name: 'Release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use the PAT for git operations too, not just GitHub API. Without
          # this, `actions/checkout` configures git remote with the default
          # GITHUB_TOKEN, so when `changesets/action` later runs
          # `git push --force origin changeset-release/main` to update the
          # Version PR, the push is authored by github-actions[bot] — and
          # GitHub deliberately skips workflow triggers for events caused by
          # GITHUB_TOKEN, leaving the Version PR's required checks stuck in
          # "Expected" forever.
          token: ${{ secrets.CHANGESETS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm 11.x, which is required for npm Trusted
          # Publishing (OIDC token exchange). Node 22 ships with npm 10.x
          # which doesn't support it. Both versions satisfy our engines.node
          # constraint (>=22.22.1), so this is purely a CI-environment choice.
          node-version: '24.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org/'

      - run: npm ci

      # Final safety gate: re-run our own Prettier config against the repo
      # and execute the full test suite before allowing any release action.
      # If formatting or tests regressed on main between PR merge and now,
      # the publish step never even starts.
      - name: Verify
        run: npm run verify

      - name: Create Release Pull Request or Publish to npm
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
          version: npx changeset version
          # Convention-compliant format: type [TASK-ID]: Message.
          # REL-0 is a synthetic task ID reserved for automated releases so the
          # bot's commits sit cleanly alongside human commits in git history.
          commit: 'chore [REL-0]: Release packages'
          title: 'chore [REL-0]: Release packages'
        env:
          # CHANGESETS_TOKEN is a Personal Access Token (classic, scopes: repo + workflow).
          # Required so the Version Packages PR opened by the bot triggers CI
          # workflows — PRs opened via the default GITHUB_TOKEN do not, by design.
          # See: https://docs.github.com/en/actions/security-guides/automatic-token-authentication
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_TOKEN }}
          # No NPM_TOKEN here — we use npm Trusted Publishing (OIDC). npm CLI
          # exchanges the GitHub Actions OIDC token (granted via id-token: write
          # above) for a short-lived npm publish credential. Provenance is signed
          # automatically and verified by npmjs.com against the trusted publisher
          # configuration of the package.
